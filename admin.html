<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS PULP | Centralized Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #CC8400; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #CC8400; margin: 0; font-size: 2.2em; }
        
        .main-container { display: flex; gap: 20px; flex-grow: 1; }
        .status-column { flex: 1; background-color: #2a2a2a; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
        .status-header { text-align: center; font-size: 1.5em; font-weight: bold; border-bottom: 2px solid #555; padding-bottom: 10px; margin-bottom: 15px; }
        .orders-list { flex-grow: 1; overflow-y: auto; }
        
        /* Specific column colors */
        #column-pending .status-header { color: #ff9800; border-color: #ff9800; }
        #column-preparing .status-header { color: #CC8400; border-color: #CC8400; }
        #column-ready .status-header { color: #25D366; border-color: #25D366; }
        
        .order-card { background-color: #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .order-card .token-header { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; border-bottom: 1px solid #555; padding-bottom: 10px; margin-bottom: 10px; }
        .order-card .token-no { color: #CC8400; font-size: 1.5em; }
        
        .items-list { font-size: 1.1em; line-height: 1.6; color: #ddd; }
        .item-row { display: flex; justify-content: space-between; }
        .total { font-size: 1.2em; font-weight: bold; color: #4caf50; margin-top: 10px; }
        
        .note { color: #ff9800; font-weight: bold; margin-top: 5px; font-size: 0.9em; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1em; flex: 1; }
        .btn-pending { background-color: #ff9800; color: #fff; }
        .btn-preparing { background-color: #CC8400; color: #fff; }
        .btn-ready { background-color: #25D366; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NS PULP - Live Control Center</h1>
        <div id="connection-status" style="color: #25D366;">🟢 Live</div>
    </div>

    <div class="main-container">
        
        <div class="status-column" id="column-pending">
            <div class="status-header">Pending Orders</div>
            <div class="orders-list" id="pending-orders"></div>
        </div>

        <div class="status-column" id="column-preparing">
            <div class="status-header">In Preparation</div>
            <div class="orders-list" id="preparing-orders"></div>
        </div>

        <div class="status-column" id="column-ready">
            <div class="status-header">Ready for Collection</div>
            <div class="orders-list" id="ready-orders"></div>
        </div>

    </div>

    <script>
        // FIREBASE CONF (Aapki Master Chabi)
        const firebaseConfig = {
            apiKey: "AIzaSyDLcGnxBbKRXP2lasOUVYL11QGog86iTBU",
            authDomain: "nsjuice-07.firebaseapp.com",
            databaseURL: "https://nsjuice-07-default-rtdb.firebaseio.com",
            projectId: "nsjuice-07",
            storageBucket: "nsjuice-07.firebasestorage.app",
            messagingSenderId: "741674109700",
            appId: "1:741674109700:web:0ea165b3567f829c805e51"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Orders ko Columns mein split karne ka logic
        db.ref('live_orders').on('value', (snapshot) => {
            const orders = snapshot.val();
            
            // Sabse pehle teeno lists ko khali karein
            document.getElementById('pending-orders').innerHTML = '';
            document.getElementById('preparing-orders').innerHTML = '';
            document.getElementById('ready-orders').innerHTML = '';
            
            if (orders) {
                // Latest orders ko upar laane ke liye reverse karein
                Object.keys(orders).reverse().forEach(key => {
                    const order = orders[key];
                    const targetListId = order.status.toLowerCase() + '-orders';
                    
                    // Naya order card HTML
                    const itemsHTML = order.items.map(item => `
                        <div class="item-row">
                            <span>▫️ ${item.name}</span>
                            <span style="color:#CC8400; font-weight:bold;">${item.price}</span>
                        </div>`).join("");
                    
                    const cardHTML = `
                        <div class="order-card">
                            <div class="token-header">
                                <span class="token-no">Token #${order.token}</span>
                                <span>${order.customer}</span>
                            </div>
                            <div class="items-list">${itemsHTML}</div>
                            <div class="total">Total: ${order.totalAmount}</div>
                            
                            <div class="note">Note: ${order.remarks || 'None'}</div>
                            
                            <div class="btn-group">
                                ${order.status === 'Pending' ? `<button class="btn btn-preparing" onclick="updateStatus('${key}', 'Preparing')">👨‍🍳 Accept & Prepare</button>` : ''}
                                ${order.status === 'Preparing' ? `<button class="btn btn-ready" onclick="updateStatus('${key}', 'Ready')">✅ Mark as Ready</button>` : ''}
                                ${order.status === 'Ready' ? `<p style="text-align:center; color:#777; width:100%;">Wait for customer to collect</p>` : ''}
                            </div>
                        </div>`;
                    
                    document.getElementById(targetListId).innerHTML += cardHTML;
                });
            }
        });

        // Status Update function
        function updateStatus(orderId, newStatus) {
            db.ref('live_orders/' + orderId).update({
                status: newStatus
            });
        }
    </script>
</body>
</html>
