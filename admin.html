<style>
:root{
  --cream:#FBF5E9; --clay:#9B5A33; --clay-dark:#6B3A1E; --brown-deep:#33190C;
  --gold:#C9A227; --gold-light:#E8C766; --orange:#E2742A; --leaf:#5C7A3D; --red:#D6483B;
}
*{box-sizing:border-box;}
body{
  background:#181210; font-family:'Poppins',sans-serif; margin:0; padding:24px; color:#fff;
  display:flex; flex-direction:column; min-height:100vh; font-size:16px;
}
.header{
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px;
  border-bottom:3px solid var(--gold); padding-bottom:18px; margin-bottom:22px;
}
.header .brand{font-family:'Cormorant Garamond',serif; color:var(--gold-light); font-size:40px; font-weight:700;}
.header .brand small{display:block; font-family:'Poppins'; font-size:13px; letter-spacing:2px; color:var(--orange); font-weight:600;}
.header .date-badge{font-size:16px; color:#ccc; background:#262019; padding:10px 20px; border-radius:22px;}
#connection-status{font-size:16px; font-weight:700;}

.summary-row{display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap;}
.summary-card{
  flex:1; min-width:160px; background:#221b15; border-radius:12px; padding:18px 22px;
  border-left:5px solid var(--gold); text-align:center;
}
.summary-card .num{font-size:38px; font-weight:800; color:var(--gold-light);}
.summary-card .lbl{font-size:14px; color:#bbb; text-transform:uppercase; letter-spacing:1px; margin-top:4px;}
.summary-card.pending{border-color:#ff9800;} .summary-card.pending .num{color:#ff9800;}
.summary-card.preparing{border-color:var(--clay);} .summary-card.preparing .num{color:var(--gold-light);}
.summary-card.ready{border-color:#25D366;} .summary-card.ready .num{color:#25D366;}

.tab-row{display:flex; gap:12px; margin-bottom:22px; flex-wrap:wrap;}
.tab-btn{
  background:#221b15; color:#ccc; border:1.5px solid #3a3025; padding:13px 24px; border-radius:10px;
  font-weight:700; font-size:16px; cursor:pointer; transition:background .15s ease, color .15s ease;
}
.tab-btn.active{ background:var(--clay); color:#fff; border-color:var(--clay); }
.panel-box{ background:#1f1812; border-radius:14px; padding:24px; }

.stock-cat-title{ color:var(--gold-light); font-weight:700; font-size:18px; margin:20px 0 10px; text-transform:uppercase; letter-spacing:1px; }
.stock-row{
  display:flex; justify-content:space-between; align-items:center; background:#2a221a; border-radius:11px;
  padding:15px 18px; margin-bottom:10px; border:1px solid #3a3025;
}
.stock-row .sname{ font-size:17px; color:#eee; }
.stock-toggle{
  border:none; padding:10px 20px; border-radius:22px; font-weight:700; font-size:14.5px; cursor:pointer;
}
.stock-toggle.in{ background:#25D366; color:#0a2b17; }
.stock-toggle.out{ background:#D6483B; color:#fff; }

.history-order{
  background:#2a221a; border-radius:11px; padding:16px 18px; margin-bottom:11px; border:1px solid #3a3025; font-size:16px;
}
.history-order .hh{ display:flex; justify-content:space-between; font-weight:700; margin-bottom:8px; }

.main-container{display:flex; gap:20px; flex-grow:1; flex-wrap:wrap;}
.status-column{flex:1; min-width:320px; background:#1f1812; border-radius:14px; padding:20px; display:flex; flex-direction:column;}
.status-header{text-align:center; font-size:1.6em; font-weight:700; border-bottom:2px solid #444; padding-bottom:13px; margin-bottom:17px;}
.orders-list{flex-grow:1; overflow-y:auto; max-height:78vh;}

#column-pending .status-header{color:#ff9800; border-color:#ff9800;}
#column-preparing .status-header{color:var(--gold-light); border-color:var(--clay);}
#column-ready .status-header{color:#25D366; border-color:#25D366;}

.order-card{
  background:#2a221a; border-radius:13px; padding:19px; margin-bottom:17px;
  box-shadow:0 5px 14px rgba(0,0,0,.35); border:1px solid #3a3025;
}
.order-card .token-header{display:flex; justify-content:space-between; align-items:center; font-size:1.35em; font-weight:700; border-bottom:1px solid #444; padding-bottom:11px; margin-bottom:11px;}
.order-card .token-no{color:var(--gold-light); font-size:1.6em; font-family:'Cormorant Garamond',serif;}
.order-card .cust-info{font-size:16px; color:#ddd; text-align:right;}
.order-card .cust-info .phone{display:block; color:#25D366; font-size:15px; margin-top:3px;}

.items-list{font-size:16px; line-height:1.8; color:#ddd;}
.item-row{display:flex; justify-content:space-between;}
.total{font-size:1.25em; font-weight:700; color:#4caf50; margin-top:10px;}
.note{color:#ff9800; font-weight:600; margin-top:8px; font-size:1em;}
.elapsed{font-size:14px; color:#888; margin-top:8px;}

.btn-group{display:flex; gap:12px; margin-top:16px;}
.btn{padding:14px; border:none; border-radius:9px; font-weight:700; cursor:pointer; font-size:16px; flex:1; transition:transform .15s ease;}
.btn:hover{transform:translateY(-2px);}
.btn-preparing{background:var(--clay); color:#fff;}
.btn-ready{background:#25D366; color:#fff;}
.empty-msg{color:#555; text-align:center; padding:30px; font-size:16px;}

<div id="tab-live">
<div class="main-container">

/* ================== TAB SWITCHING ================== */
function switchTab(tab){

    document.getElementById('tab-' + t).style.display = (t === tab) ? 'block' : 'none';
    document.getElementById('tabBtn-' + t).classList.toggle('active', t === tab);

let currentStockOut = {};
db.ref('stock_out').on('value', snap => {
  currentStockOut = snap.val() || {};
  if(document.getElementById('tab-stock').style.display !== 'none') renderStockPanel();
});

function renderStockPanel(){
  const container = document.getElementById('stockList');
  container.innerHTML = '';
  let lastCat = '';
  STOCK_LIST.forEach(item => {
    if(item.cat !== lastCat){
      container.innerHTML += `<div class="stock-cat-title">${item.cat}</div>`;
      lastCat = item.cat;
    }
    const isOut = !!currentStockOut[item.name];
    container.innerHTML += `
      <div class="stock-row">
        <span class="sname">${item.name}</span>
        <button class="stock-toggle ${isOut ? 'out' : 'in'}" onclick="toggleStock('${item.name.replace(/'/g,"\\'")}', ${isOut})">
          ${isOut ? '❌ Out of Stock' : '✅ In Stock'}
        </button>
      </div>`;
  });
}

function toggleStock(name, isCurrentlyOut){
  db.ref('stock_out/' + name).set(!isCurrentlyOut);
}

/* ================== ORDER HISTORY ================== */
document.getElementById('historyDate').valueAsDate = new Date();

function loadHistory(){
  const dateInput = document.getElementById('historyDate').value; // YYYY-MM-DD
  if(!dateInput){ alert('Please pick a date'); return; }
  const listEl = document.getElementById('historyList');
  const summaryEl = document.getElementById('historySummary');
  listEl.innerHTML = '<div class="empty-msg">Loading...</div>';

  db.ref('orders/' + dateInput).once('value').then(snap => {
    const orders = snap.val();
    if(!orders){
      listEl.innerHTML = '<div class="empty-msg">No orders found for this date</div>';
      summaryEl.textContent = '';
      return;
    }
    const keys = Object.keys(orders).sort((a,b) => (orders[b].placedAt||0) - (orders[a].placedAt||0));
    let totalRevenue = 0;
    let html = '';
    keys.forEach(k => {
      const o = orders[k];
      totalRevenue += (o.totalAmount || 0);
      const itemsStr = (o.items || []).map(it => it.name + ' x' + it.qty).join(', ');
      html += `
        <div class="history-order">
          <div class="hh"><span>#${o.orderNumber} — ${o.customer}</span><span style="color:var(--gold-light);">₹${o.totalAmount}</span></div>
          <div style="color:#bbb;">${itemsStr}</div>
          <div style="color:#888; font-size:12px; margin-top:4px;">${o.paymentMethod || 'Cash'} • ${o.status}</div>
        </div>`;
    });
    summaryEl.textContent = `📊 ${keys.length} orders • Total Revenue: ₹${totalRevenue}`;
    listEl.innerHTML = html;
  });
}

/* ================== CUSTOMER FEEDBACK ================== */
db.ref('feedback').on('value', snap => {
  const data = snap.val() || {};
  const keys = Object.keys(data).sort((a,b) => (data[b].ts||0) - (data[a].ts||0));

  const badge = document.getElementById('feedbackCount');
  if(keys.length > 0){
    badge.textContent = keys.length;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }

  const listEl = document.getElementById('feedbackList');
  if(keys.length === 0){
    listEl.innerHTML = '<div class="empty-msg">No feedback yet</div>';
    return;
  }
  listEl.innerHTML = keys.map(k => {
    const f = data[k];
    const when = f.ts ? new Date(f.ts).toLocaleString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    const starsLine = f.ratingAvg ? `<div style="color:var(--gold-light); margin-top:4px;">${'★'.repeat(Math.round(f.ratingAvg))}${'☆'.repeat(5-Math.round(f.ratingAvg))} (${f.ratingAvg})</div>` : '';
    const itemsLine = f.itemRatings ? `<div style="font-size:12.5px; color:#999; margin-top:3px;">${f.itemRatings}</div>` : '';
    const textLine = f.text ? `<div style="color:#ddd; margin-top:5px;">${f.text}</div>` : '';
    return `
      <div class="history-order">
        <div class="hh"><span>${f.customer || 'Anonymous'}</span><span style="color:#888; font-size:12px; font-weight:400;">${when}</span></div>
        ${starsLine}${itemsLine}${textLine}
      </div>`;
  }).join('');
});

// Get today's date key exactly as index13.html writes it (YYYY-MM-DD)
function todayKey(){
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
}
function prettyDate(){
  return new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}
function elapsedMins(ts){
  if(!ts) return '';
  const mins = Math.floor((Date.now() - ts) / 60000);
  return mins <= 0 ? 'just now' : mins + ' min ago';
}

document.getElementById('dateBadge').textContent = "Today: " + prettyDate();

/* ---- Sound alerts + browser notifications + keep screen awake ---- */
let soundEnabled = false;
document.getElementById('enableSoundBtn').addEventListener('click', () => {
  soundEnabled = true;
  playDing(1); // quiet confirmation ding so staff knows it's working
  const btn = document.getElementById('enableSoundBtn');
  btn.textContent = "🔔 Sound On";
  btn.style.background = "#25D366";

  if('Notification' in window && Notification.permission !== 'granted'){
    Notification.requestPermission();
  }
  requestWakeLock();
});

function notifyStaff(title, body){
  if('Notification' in window && Notification.permission === 'granted'){
    try{ new Notification(title, { body, icon: 'icon-192.png' }); }catch(e){}
  }
}

/* Keep the counter/tablet screen from sleeping while the dashboard is open */
let wakeLock = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){ /* not supported or blocked, ignore silently */ }
}
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && soundEnabled) requestWakeLock();
});

function playDing(times){
  if(!soundEnabled) return;
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const now = ctx.currentTime;
    const reps = times || 1;
    for(let r = 0; r < reps; r++){
      [660, 880].forEach((freq, i) => {
        const t = now + r*0.6 + i*0.15;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, t);
        gain.gain.exponentialRampToValueAtTime(1.0, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 0.45);
      });
    }
  }catch(e){ /* audio blocked, ignore silently */ }
}

let knownOrderKeys = new Set();
let isFirstRenderForToday = true;

let currentRef = null;
let currentDateKey = null;

function attachTodayListener(){
  const key = todayKey();
  if(currentRef) currentRef.off('value'); // stop listening to the old day
  currentDateKey = key;
  isFirstRenderForToday = true;
  knownOrderKeys = new Set();
  currentRef = db.ref('orders/' + key);
  currentRef.on('value', renderOrders);
}

function renderOrders(snapshot){
  const orders = snapshot.val();
  const pendingEl = document.getElementById('pending-orders');
  const preparingEl = document.getElementById('preparing-orders');
  const readyEl = document.getElementById('ready-orders');

  pendingEl.innerHTML = ''; preparingEl.innerHTML = ''; readyEl.innerHTML = '';
  let counts = {Pending:0, Preparing:0, Ready:0};

  const keysNow = orders ? Object.keys(orders) : [];

  // Ring only for genuinely new orders arriving after the dashboard is already open (not on first load of the day)
  if(!isFirstRenderForToday){
    keysNow.forEach(k => {
      if(!knownOrderKeys.has(k)){
        playDing(3); // 3 rings — strong alert for a brand-new order
        notifyStaff("🆕 New Order Received!", "Check the Pending column on your NS Juice dashboard.");
      }
    });
  }
  knownOrderKeys = new Set(keysNow);
  isFirstRenderForToday = false;

  if(orders){
    const keys = Object.keys(orders).sort((a,b) => (orders[b].placedAt||0) - (orders[a].placedAt||0));

    keys.forEach(key => {
      const order = orders[key];
      counts[order.status] = (counts[order.status] || 0) + 1;
      const targetListId = order.status.toLowerCase() + '-orders';

      const itemsHTML = (order.items || []).map(item => `
        <div class="item-row">
          <span>▫️ ${item.name} <span style="font-size:0.85em;color:#ff9800;">${item.remark || ''}</span></span>
          <span style="color:var(--gold-light); font-weight:700;">₹${item.price}</span>
        </div>`).join("");

      // Customer payment method added in the header
      const cardHTML = `
        <div class="order-card">
          <div class="token-header">
            <span class="token-no">Order #${order.orderNumber}</span>
            <span class="cust-info">${order.customer}<br><span class="phone" style="color:var(--gold-light);">💳 ${order.paymentMethod || 'Cash'}</span></span>
          </div>
          <div class="items-list">${itemsHTML}</div>
          <div class="total">Total: ₹${order.totalAmount}</div>
          <div class="note">Note: ${order.remarks || 'None'}</div>
          <div class="elapsed">🕐 Placed ${elapsedMins(order.placedAt || Date.now())}</div>
          <div class="btn-group">
            ${order.status === 'Pending' ? `<button class="btn btn-preparing" onclick="updateStatus('${key}', 'Preparing')">👨‍🍳 Accept &amp; Prepare</button>` : ''}
            ${order.status === 'Preparing' ? `<button class="btn btn-ready" onclick="updateStatus('${key}', 'Ready')">✅ Mark as Ready</button>` : ''}
            ${order.status === 'Ready' ? `<p style="text-align:center; color:#777; width:100%; font-size:12.5px;">Waiting for customer to collect</p>` : ''}
          </div>
        </div>`;

      document.getElementById(targetListId).innerHTML += cardHTML;
    });
  }

  // Update Counters
  document.getElementById('countPending').textContent = counts.Pending;
  document.getElementById('countPreparing').textContent = counts.Preparing;
  document.getElementById('countReady').textContent = counts.Ready;

  // Show empty messages if no orders
  ['pending-orders','preparing-orders','ready-orders'].forEach(id => {
    const el = document.getElementById(id);
    if(!el.innerHTML.trim()) el.innerHTML = '<div class="empty-msg">No orders here</div>';
  });
}

attachTodayListener();
// Check every minute in case midnight passes while dashboard stays open — switch to the new day's orders automatically
setInterval(() => {
  if(todayKey() !== currentDateKey){
    document.getElementById('dateBadge').textContent = "Today: " + prettyDate();
    attachTodayListener();
  }
}, 60000);

// Update Status in Firebase
function updateStatus(orderId, newStatus){
  db.ref('orders/' + currentDateKey + '/' + orderId).update({
      status: newStatus,
      statusUpdatedAt: Date.now()
  });
}
</script>
