<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NS PULP | Official Menu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; padding: 20px; }
        .menu-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #ccc; }
        .btn-add { background: #5C4033; color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn-confirm { background: #CC8400; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-weight: bold; }
        #live-tracker { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <h2>NS PULP MENU</h2>
    <div id="menu-container"></div>

    <div style="margin-top:30px; padding:20px; border: 2px solid #CC8400; border-radius: 10px;">
        <h3>🛒 Your Order</h3>
        <div id="cart-list">No items selected.</div>
        <p><b>Total: ₹<span id="total-bill">0</span></b></p>
        <input type="text" id="customerName" class="input-field" placeholder="Name / Table No.">
        <input type="text" id="orderRemarks" class="input-field" placeholder="Remarks (No Ice, Extra Salt, etc.)">
        <input type="text" id="utrNumber" class="input-field" placeholder="UTR/Txn ID">
        <button class="btn-confirm" onclick="placeCloudOrder()">CONFIRM ORDER</button>
    </div>

    <div id="live-tracker">
        <h2 style="color: #CC8400;">Order Confirmed!</h2>
        <h1 style="font-size: 4em;" id="display-token">#--</h1>
        <p>Aapka order process ho raha hai...</p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDLcGnxBbKRXP2lasOUVYL11QGog86iTBU", authDomain: "nsjuice-07.firebaseapp.com", databaseURL: "https://nsjuice-07-default-rtdb.firebaseio.com", projectId: "nsjuice-07", storageBucket: "nsjuice-07.firebasestorage.app", messagingSenderId: "741674109700", appId: "1:741674109700:web:0ea165b3567f829c805e51" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const fullMenu = [{name: "Mousambi Juice", price: 50}, {name: "Orange Juice", price: 50}, {name: "Mango Shake", price: 60}, {name: "Cold Coffee", price: 50}, {name: "Veg Sandwich", price: 50}];
        
        let container = document.getElementById('menu-container');
        fullMenu.forEach(item => {
            container.innerHTML += `<div class="menu-item">${item.name} (₹${item.price}) <button class="btn-add" onclick="add('${item.name}', ${item.price})">Add</button></div>`;
        });

        let cart = []; let total = 0;
        function add(n, p) { cart.push({name: n, price: p}); total += p; document.getElementById('total-bill').innerText = total; document.getElementById('cart-list').innerText = cart.map(i=>i.name).join(', '); }

        function placeCloudOrder() {
            let name = document.getElementById('customerName').value;
            if(!name || cart.length === 0) { alert("Name & Items zaroori hain!"); return; }
            db.ref('order_counter').transaction((c) => (c || 0) + 1, (e, comm, snap) => {
                if (comm) {
                    db.ref('live_orders').push({ token: snap.val(), customer: name, remarks: document.getElementById('orderRemarks').value, items: cart, totalAmount: total, utr: document.getElementById('utrNumber').value, status: "Accepted" });
                    document.body.innerHTML = `<h1>Token: #${snap.val()}</h1><p>Order Placed!</p>`;
                }
            });
        }
    </script>
</body>
</html>
