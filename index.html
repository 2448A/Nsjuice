<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Pulp | Order Online</title>
    <style>
        body {
            background-color: #FAF9F6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px; color: #333; text-align: center;
        }
        h1 { color: #FF8C00; font-size: 3em; margin-bottom: 5px; letter-spacing: 2px; }
        .tagline { color: #777; margin-bottom: 30px; font-weight: 300; }
        
        .menu-container, .cart-container {
            background-color: #ffffff; max-width: 500px; margin: 0 auto 20px auto;
            padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 5px solid #FF8C00; text-align: left;
        }
        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 1.2em; margin: 15px 0; padding-bottom: 15px; border-bottom: 1px dashed #eee;
        }
        .item-price { color: #FF8C00; font-weight: bold; margin-right: 15px; }
        .add-btn {
            background-color: #FF8C00; color: white; border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
        }
        .add-btn:active { background-color: #e07b00; }
        
        #cart-items { font-size: 1.1em; color: #555; margin-bottom: 15px; line-height: 1.6; }
        .total-bill { font-size: 1.3em; font-weight: bold; border-top: 2px solid #333; padding-top: 10px; }
        
        input[type="text"] {
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc;
            border-radius: 8px; box-sizing: border-box; font-size: 1em;
        }
        .whatsapp-btn {
            background-color: #25D366; color: white; width: 100%; padding: 15px;
            border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; cursor: pointer;
        }
        .upi-section { margin-top: 15px; font-size: 0.9em; color: #666; text-align: center; }
    </style>
</head>
<body>

    <h1>NS PULP</h1>
    <div class="tagline">Premium Fresh Juices</div>

    <!-- MENU SECTION -->
    <div class="menu-container">
        <h3>Our Menu</h3>
        <div class="menu-item">
            <span>🍊 Citrus Burst</span>
            <div><span class="item-price">120</span><button class="add-btn" onclick="addToCart('Citrus Burst', 120)">Add</button></div>
        </div>
        <div class="menu-item">
            <span>🥭 Mango Velvet</span>
            <div><span class="item-price">150</span><button class="add-btn" onclick="addToCart('Mango Velvet', 150)">Add</button></div>
        </div>
        <div class="menu-item">
            <span>🍉 Watermelon Breeze</span>
            <div><span class="item-price">90</span><button class="add-btn" onclick="addToCart('Watermelon Breeze', 90)">Add</button></div>
        </div>
    </div>

    <!-- CART SECTION -->
    <div class="cart-container">
        <h3>Your Order</h3>
        <div id="cart-items">Cart is empty right now.</div>
        <div class="total-bill" id="total-bill">Total: 0</div>
        
        <input type="text" id="customerName" placeholder="Enter Your Name or Table No.">
        
        <button class="whatsapp-btn" onclick="sendOrder()">Send Order via WhatsApp</button>
        
        <div class="upi-section">
            <b>UPI Payment ID:</b> nspulp@ybl <br>
            (Send order first, then pay via UPI)
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        let cart = [];
        let total = 0;

        function addToCart(itemName, price) {
            cart.push({ name: itemName, price: price });
            total += price;
            updateCart();
        }

        function updateCart() {
            let cartDiv = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartDiv.innerHTML = "Cart is empty right now.";
            } else {
                cartDiv.innerHTML = cart.map(item => "✔️ " + item.name + " (" + item.price + ")").join("<br>");
            }
            document.getElementById('total-bill').innerHTML = "Total: " + total;
        }

        function sendOrder() {
            let name = document.getElementById('customerName').value;
            if (!name) { alert("Please enter your Name or Table Number!"); return; }
            if (cart.length === 0) { alert("Please add some items to your order first!"); return; }

            // BANAO WHATSAPP MESSAGE
            let message = "*New VIP Order: NS PULP*%0A";
            message += "*Customer/Table:* " + name + "%0A%0A";
            message += "*Items:*%0A";
            cart.forEach(item => { message += "- " + item.name + " (" + item.price + ")%0A"; });
            message += "%0A*Total Bill:* " + total + "%0A";
            message += "%0A_Please confirm the order._";

            // BHAII, YAHAN APNA NUMBER DAALNA (91 laga kar)
            let phoneNumber = "918941806990"; 

            let whatsappLink = "https://wa.me/" + phoneNumber + "?text=" + message;
            window.open(whatsappLink, "_blank");
        }
    </script>
</body>
</html>
