<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Juice | Premium Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { 
            --cream: #FBF5E9; 
            --clay: #9B5A33; 
            --gold: #C9A227; 
            --orange: #E2742A;
            --text-dark: #33190C;
        }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--cream); color: var(--text-dark); }
        
        /* Welcome Screen Overlay */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--text-dark); color: var(--cream); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s ease; text-align: center; padding: 20px;}
        #welcome-screen h1.logo { font-family: 'Cormorant Garamond', serif; font-size: 3.5em; margin: 10px 0; color: var(--gold); letter-spacing: 2px; }
        
        /* Header */
        .header { background: var(--text-dark); color: var(--cream); padding: 20px; text-align: center; border-bottom: 3px solid var(--gold); }
        .header h1 { font-family: 'Cormorant Garamond', serif; margin: 0; font-size: 2.8em; color: var(--gold); letter-spacing: 2px; }
        .timing-badge { display: inline-block; background: rgba(201, 162, 39, 0.2); padding: 6px 15px; border-radius: 20px; font-size: 0.9em; margin-top: 10px; border: 1px solid var(--gold); color: var(--cream); }
        
        /* Menu Layout */
        .category-title { color: var(--clay); border-bottom: 2px solid var(--orange); padding-bottom: 5px; margin: 25px 15px 10px; font-weight: 700; text-transform: uppercase; font-size: 1.2em; }
        .item-row { display: flex; justify-content: space-between; padding: 15px; margin: 8px 15px; background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); align-items: center; border-left: 4px solid var(--gold); }
        .item-name { font-weight: 600; font-size: 1.05em; }
        .btn-size { background: var(--clay); color: #fff; padding: 8px 12px; border: none; border-radius: 6px; margin: 2px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif;}
        .btn-size:active { transform: scale(0.95); background: var(--orange); }
        
        /* Cart & Checkout */
        .cart-section { margin: 30px 15px; padding: 20px; background: #fff; border-radius: 12px; border: 2px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .payment-options { display: flex; justify-content: space-around; margin: 15px 0; padding: 15px; background: var(--cream); border-radius: 8px; border: 1px solid #eee; }
        .payment-options label { font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .input-field { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1em; font-family: 'Poppins', sans-serif; background: #fafafa;}
        .btn-confirm { background: #25D366; color: white; padding: 16px; width: 100%; border: none; border-radius: 8px; font-size: 1.2em; font-weight: 700; cursor: pointer; opacity: 0.5; pointer-events: none; transition: 0.3s; font-family: 'Poppins', sans-serif; margin-top: 10px;}
        .btn-confirm.active { opacity: 1; pointer-events: auto; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4); }
        
        /* Modals & Tracking */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(51, 25, 12, 0.85); display:none; justify-content:center; align-items:center; z-index: 1000; }
        .modal-content { background:#fff; padding:25px; border-radius:15px; width:85%; max-width: 400px; }
        
        #live-dashboard { display: none; text-align: center; padding: 40px 20px; }
        .order-number { font-size: 5.5em; color: var(--orange); margin: 10px 0; font-family: 'Cormorant Garamond', serif; font-weight: 700; line-height: 1; }
        .status-box { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-top: 25px; border-top: 5px solid var(--gold); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div style="font-size: 4em; margin-bottom: 10px;">🙏</div>
        <h2 style="font-weight: 400; margin: 0; letter-spacing: 1px;">Welcome to</h2>
        <h1 class="logo">NS JUICE</h1>
        <p style="color: var(--gold); font-weight: 500; letter-spacing: 1px;">Premium Freshness Delivered.</p>
    </div>

    <div id="main-screen">
        <div class="header">
            <h1>NS JUICE</h1>
            <div class="timing-badge">🕒 Open Today: 10:00 AM - 10:00 PM</div>
        </div>

        <div id="menu-area"></div>

        <div class="cart-section">
            <h2 style="margin-top: 0; color: var(--clay); font-family: 'Cormorant Garamond', serif; font-size: 2em; border-bottom: 1px solid #eee; padding-bottom: 10px;">🛒 Your Cart</h2>
            <div id="cart-items" style="margin: 15px 0; color: #555;">No items selected yet.</div>
            <h2 style="text-align: right; color: var(--orange); padding-top: 10px;">Total: ₹<span id="cart-total">0</span></h2>
            
            <input type="text" id="custName" class="input-field" placeholder="Enter Your Name / Table No.">
            
            <h3 style="color: var(--clay); margin-bottom: 5px; font-size: 1.1em;">Payment Preference</h3>
            <div class="payment-options">
                <label><input type="radio" name="payMethod" value="Pay Online at Counter" onchange="enableOrder()"> 📱 QR at Counter</label>
                <label><input type="radio" name="payMethod" value="Cash" onchange="enableOrder()"> 💵 Cash</label>
            </div>

            <button id="place-btn" class="btn-confirm" onclick="placeOrder()">Select Payment to Proceed</button>
        </div>
    </div>

    <div id="live-dashboard">
        <h2 style="color: var(--clay); font-family: 'Cormorant Garamond', serif; font-size: 2.2em; margin-bottom: 5px;">Thank you! 🙏</h2>
        <p style="color: #666; font-weight: 500;">Your Order Number is</p>
        <div class="order-number" id="display-order-num">#--</div>
        
        <div class="status-box">
            <h3 id="display-status" style="color: var(--orange); font-size: 1.4em;">Waiting for Cafe to Accept...</h3>
            <p id="queue-status" style="color: var(--clay); font-weight: 600; font-size: 1.1em; margin: 15px 0;">Checking queue...</p>
            <div style="background: var(--cream); padding: 12px; border-radius: 8px; border: 1px dashed var(--gold);">
                <p style="color: var(--text-dark); font-size: 0.95em; margin: 0; font-weight: 500;">⏳ Estimated Wait Time: <b style="color: var(--orange);">10-15 Minutes</b></p>
            </div>
        </div>
    </div>

    <div class="modal" id="prefModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color: var(--clay); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 0;"></h3>
            
            <div style="margin: 15px 0;">
                <label style="font-weight: 600; font-size: 0.9em; color: #555;">Ice Preference:</label>
                <select id="prefIce" class="input-field" style="margin-top: 5px; padding: 12px;">
                    <option>Regular Ice</option><option>No Ice</option><option>Extra Ice</option>
                </select>
            </div>
            
            <div style="margin: 15px 0;">
                <label style="font-weight: 600; font-size: 0.9em; color: #555;">Special Instructions (Optional):</label>
                <select id="prefExtra" class="input-field" style="margin-top: 5px; padding: 12px;">
                    <option>Regular</option><option>No Sugar</option><option>Less Sugar</option><option>No Salt</option><option>Extra Salt</option>
                </select>
            </div>
            
            <button class="btn-size" style="width: 100%; padding: 15px; font-size: 1.1em; margin-top: 10px;" onclick="saveItem()">Add to Cart</button>
            <button onclick="document.getElementById('prefModal').style.display='none'" style="width: 100%; padding: 12px; margin-top: 10px; background: #eee; border: none; color: #555; border-radius: 6px; font-weight: 600; cursor: pointer;">Cancel</button>
        </div>
    </div>

    <script>
        // Smooth Welcome Screen Fade Out
        setTimeout(() => {
            let ws = document.getElementById('welcome-screen');
            ws.style.opacity = '0';
            setTimeout(() => { ws.style.display = 'none'; }, 600);
        }, 2500);

        // FIREBASE CONFIG (Aapki Master Keys)
        const firebaseConfig = {
            apiKey: "AIzaSyDLcGnxBbKRXP2lasOUVYL11QGog86iTBU",
            authDomain: "nsjuice-07.firebaseapp.com",
            databaseURL: "https://nsjuice-07-default-rtdb.firebaseio.com",
            projectId: "nsjuice-07",
            storageBucket: "nsjuice-07.firebasestorage.app",
            messagingSenderId: "741674109700",
            appId: "1:741674109700:web:0ea165b3567f829c805e51"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // NS JUICE MENU
        const menu = [
            { cat: "Snacks Menu", name: "Veg Grill Sandwich", price: 50 },
            { cat: "Snacks Menu", name: "Bun Maska", price: 30 },
            { cat: "Snacks Menu", name: "Hot Coffee", price: 30 },
            { cat: "Vegetable Juices", name: "Mix Vegetable", s: 40, m: 50, l: 60 },
            { cat: "Vegetable Juices", name: "ABC Juice", s: 40, m: 50, l: 60 },
            { cat: "Fruit Juices", name: "Mousambi Juice", s: 40, m: 50, l: 60 },
            { cat: "Fruit Juices", name: "Mix Fruit Juice", s: 40, m: 50, l: 60 },
            { cat: "Natural Shakes", name: "Mango Shake", s: 40, m: 50, l: 60 },
            { cat: "Natural Shakes", name: "Chocolate Shake", s: 40, m: 50, l: 60 }
        ];

        let cart = [], total = 0, currentItem = {}, myOrderKey = null, myOrderNum = 0;

        // Render Menu
        const area = document.getElementById('menu-area');
        let currentCategory = "";
        menu.forEach(i => {
            if(currentCategory !== i.cat) {
                area.innerHTML += `<div class="category-title">${i.cat}</div>`;
                currentCategory = i.cat;
            }
            let btns = i.price ? 
                `<button class="btn-size" onclick="openModal('${i.name}', ${i.price})">₹${i.price}</button>` : 
                `<button class="btn-size" onclick="openModal('${i.name} (S)', ${i.s})">S: ₹${i.s}</button>
                 <button class="btn-size" onclick="openModal('${i.name} (M)', ${i.m})">M: ₹${i.m}</button>
                 <button class="btn-size" onclick="openModal('${i.name} (L)', ${i.l})">L: ₹${i.l}</button>`;
            
            area.innerHTML += `<div class="item-row"><span class="item-name">${i.name}</span><span>${btns}</span></div>`;
        });

        // Cart & Modal Logic
        function openModal(name, price) {
            currentItem = {name, price};
            document.getElementById('modalTitle').innerText = name + " - ₹" + price;
            document.getElementById('prefIce').value = "Regular Ice";
            document.getElementById('prefExtra').value = "Regular";
            document.getElementById('prefModal').style.display = 'flex';
        }

        function saveItem() {
            let ice = document.getElementById('prefIce').value;
            let extra = document.getElementById('prefExtra').value;
            let remark = (ice !== "Regular Ice" || extra !== "Regular") ? `(${ice}, ${extra})` : "";
            
            cart.push({name: currentItem.name, price: currentItem.price, remark: remark});
            total += currentItem.price;
            updateCart();
            document.getElementById('prefModal').style.display = 'none';
        }

        function removeItem(idx) {
            total -= cart[idx].price;
            cart.splice(idx, 1);
            updateCart();
        }

        function updateCart() {
            let cDiv = document.getElementById('cart-items');
            cDiv.innerHTML = cart.length === 0 ? "No items selected." : cart.map((i, idx) => 
                `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px dashed #ddd; align-items:center;">
                    <span><b style="color:var(--text-dark)">${i.name}</b> <br><span style="font-size:0.85em; color:var(--orange); font-weight:600;">${i.remark}</span></span>
                    <span style="font-weight:600;">₹${i.price} <button onclick="removeItem(${idx})" style="background:#e74c3c; color:white; border:none; padding:4px 10px; border-radius:4px; margin-left:10px; cursor:pointer;">✕</button></span>
                </div>`).join('');
            document.getElementById('cart-total').innerText = total;
            
            if(cart.length === 0) {
                let btn = document.getElementById('place-btn');
                btn.innerText = "Select Payment to Proceed";
                btn.classList.remove('active');
            }
        }

        function enableOrder() {
            if(cart.length > 0) {
                let btn = document.getElementById('place-btn');
                btn.innerText = "PLACE ORDER NOW";
                btn.classList.add('active');
            }
        }

        // Order Placement & Smart Token Logic
        function getTodayDate() { return new Date().toLocaleDateString('en-GB'); }

        function placeOrder() {
            let name = document.getElementById('custName').value;
            let payMethodInput = document.querySelector('input[name="payMethod"]:checked');
            
            if(!name || cart.length === 0) { alert("Please enter your name and add items to the cart!"); return; }
            if(!payMethodInput) { alert("Please select a payment method!"); return; }

            let pMethod = payMethodInput.value;
            let today = getTodayDate();

            db.ref('live_orders').once('value').then((snap) => {
                let orders = snap.val();
                let activeExist = false;
                let maxToken = 0;

                if(orders) {
                    Object.values(orders).forEach(o => {
                        if(o.date === today) {
                            if(o.orderNumber > maxToken) maxToken = o.orderNumber;
                            if(o.status === 'Pending' || o.status === 'Preparing') {
                                activeExist = true;
                            }
                        }
                    });
                }

                // If no pending/preparing orders exist today, token restarts at 1
                let tokenNo = activeExist ? (maxToken + 1) : 1;
                
                saveOrderToFirebase(name, pMethod, tokenNo, today);
            }).catch((error) => {
                alert("Network error, please try again.");
                console.error(error);
            });
        }

        function saveOrderToFirebase(name, pMethod, tokenNo, today) {
            myOrderNum = tokenNo;
            let combinedRemarks = cart.filter(i => i.remark).map(i => i.name + ": " + i.remark).join(" | ");
            
            let newOrder = db.ref('live_orders').push();
            myOrderKey = newOrder.key;
            
            newOrder.set({
                orderNumber: tokenNo,
                date: today,
                customer: name,
                payment: pMethod,
                items: cart,
                totalAmount: total,
                remarks: combinedRemarks,
                status: "Pending",
                placedAt: Date.now()
            }).then(() => {
                document.getElementById('main-screen').style.display = 'none';
                document.getElementById('live-dashboard').style.display = 'block';
                document.getElementById('display-order-num').innerText = "#" + tokenNo;
                trackLiveOrder(today);
            }).catch((error) => {
                alert("Order failed to place. Please check your internet connection.");
                console.error(error);
            });
        }

        // Live Tracking & Queue Position
        function trackLiveOrder(todayDate) {
            db.ref('live_orders/' + myOrderKey).on('value', snap => {
                if(!snap.exists()) return;
                let status = snap.val().status;
                let statDiv = document.getElementById('display-status');
                
                if(status === 'Pending') statDiv.innerText = "Waiting for Cafe to Accept...";
                if(status === 'Preparing') { statDiv.innerText = "👨‍🍳 Preparing Your Order..."; statDiv.style.color = "var(--clay)"; }
                if(status === 'Ready') { 
                    statDiv.innerText = "✅ ORDER IS READY!"; 
                    statDiv.style.color = "#25D366"; 
                    document.getElementById('queue-status').innerText = "Please collect from the counter."; 
                }
            });

            db.ref('live_orders').orderByChild('date').equalTo(todayDate).on('value', snap => {
                let orders = snap.val();
                let queueCount = 0;
                if(orders) {
                    Object.values(orders).forEach(o => {
                        if(o.orderNumber < myOrderNum && (o.status === 'Pending' || o.status === 'Preparing')) {
                            queueCount++;
                        }
                    });
                }
                
                let myStatus = document.getElementById('display-status').innerText;
                if(myStatus !== "✅ ORDER IS READY!") {
                    document.getElementById('queue-status').innerText = queueCount > 0 ? 
                        `Orders ahead of you: ${queueCount}` : 
                        "You are next in line! 🎉";
                }
            });
        }
    </script>
</body>
</html>
