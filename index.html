<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS Pulp | Premium Juices</title>
    <style>
        body {
            background-color: #FAF9F6; /* Light Cream Background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            color: #333;
        }
        h1 {
            color: #FF8C00; /* Premium Orange Accent */
            font-size: 3.5em;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .tagline {
            font-size: 1.2em;
            color: #777;
            margin-bottom: 40px;
            font-weight: 300;
        }
        .menu-container {
            background-color: #ffffff;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 5px solid #FF8C00;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            font-size: 1.3em;
            margin: 20px 0;
            border-bottom: 1px dashed #eee;
            padding-bottom: 10px;
        }
        .item-name {
            font-weight: 500;
        }
        .item-price {
            color: #FF8C00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>NS PULP</h1>
    <div class="tagline">100% Natural • No Added Sugar • Pure Freshness</div>

    <div class="menu-container">
        <div class="menu-item">
            <span class="item-name">🍊 Citrus Burst</span>
            <span class="item-price">120</span>
        </div>
        <div class="menu-item">
            <span class="item-name">🥭 Mango Velvet</span>
            <span class="item-price">150</span>
        </div>
        <div class="menu-item">
            <span class="item-name">🍉 Watermelon Breeze</span>
            <span class="item-price">90</span>
        </div>
    </div>

</body>
</html>
