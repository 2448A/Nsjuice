<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NS PULP | Live Order</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #fff; }
        .header { background: #5C4033; color: #fff; padding: 15px; text-align: center; }
        .cat-title { background: #CC8400; color: white; padding: 10px; margin-top: 10px; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .btn-size { background: #5C4033; color: white; padding: 5px 10px; border: none; border-radius: 4px; margin: 2px; font-size: 12px; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:20px; border-radius:10px; width:80%; }
        .btn-confirm { background:#25D366; color:white; padding:15px; width:100%; border:none; margin-top:20px; font-weight:bold; }
    </style>
</head>
<body>

    <div class="header"><h1>NS PULP</h1></div>

    <!-- Menu Area -->
    <div id="menu-area"></div>

    <div style="padding:20px;">
        <h3>🛒 Cart</h3>
        <div id="cart-items"></div>
        <input type="text" id="custName" placeholder="Enter Name/Table" style="width:100%; padding:10px; margin:10px 0;">
        <button class="btn-confirm" onclick="placeOrder()">CONFIRM ORDER</button>
    </div>

    <!-- Modal for Remarks -->
    <div class="modal" id="prefModal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <label>Ice: <select id="prefIce"><option>Yes</option><option>No</option></select></label><br><br>
            <label>Add-ons: <select id="prefExtra"><option>Normal</option><option>Extra Salt</option><option>Less Sugar</option></select></label><br><br>
            <button class="btn-confirm" onclick="saveItem()">Add to Cart</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* APNI KEY YAHAN DALEIN */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // FULL DATA WITH S, M, L
        const menu = [
            { cat: "Fruit Juices", name: "Mousambi Juice", s: 40, m: 50, l: 60 },
            { cat: "Fruit Juices", name: "Orange Juice", s: 40, m: 50, l: 60 },
            { cat: "Natural Shakes", name: "Mango Shake", s: 40, m: 50, l: 60 },
            { cat: "Natural Shakes", name: "Chocolate Shake", s: 40, m: 50, l: 60 },
            { cat: "Snacks", name: "Veg Sandwich", s: 50, m: 0, l: 0 } // Snacks ke liye S/M/L ki zarurat nahi
        ];

        let cart = [];
        let currentItem = {};

        // Render Menu
        const area = document.getElementById('menu-area');
        menu.forEach(i => {
            area.innerHTML += `
                <div class="item-row">
                    <span>${i.name}</span>
                    <span>
                        ${i.s ? `<button class="btn-size" onclick="openModal('${i.name} S', ${i.s})">S:${i.s}</button>` : ''}
                        ${i.m ? `<button class="btn-size" onclick="openModal('${i.name} M', ${i.m})">M:${i.m}</button>` : ''}
                        ${i.l ? `<button class="btn-size" onclick="openModal('${i.name} L', ${i.l})">L:${i.l}</button>` : ''}
                    </span>
                </div>`;
        });

        function openModal(name, price) {
            currentItem = {name, price};
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('prefModal').style.display = 'flex';
        }

        function saveItem() {
            let ice = document.getElementById('prefIce').value;
            let extra = document.getElementById('prefExtra').value;
            cart.push({...currentItem, ice, extra});
            document.getElementById('prefModal').style.display = 'none';
            document.getElementById('cart-items').innerHTML += `<div>${currentItem.name} (${ice}, ${extra})</div>`;
        }

        function placeOrder() {
            let name = document.getElementById('custName').value;
            db.ref('order_counter').transaction(c => (c || 0) + 1, (err, comm, snap) => {
                if(comm) {
                    db.ref('live_orders').push({ token: snap.val(), customer: name, items: cart, status: "Pending" });
                    document.body.innerHTML = `<h1>Token: #${snap.val()}</h1>`;
                }
            });
        }
    </script>
</body>
</html>
