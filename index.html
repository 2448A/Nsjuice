<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NS PULP | Live Menu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .menu-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .action-btn { background-color: #CC8400; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div id="fruit-juices-container"></div>
        <div id="veg-juices-container"></div>
        <div id="shakes-container"></div>
        <div id="snacks-container"></div>

        <div id="cart-section" style="margin-top:20px; border-top: 2px solid #333; padding-top:10px;">
            <h3>🛒 Order Details</h3>
            <div id="cart-items">No items selected.</div>
            <p><b>Total: <span id="total-bill">0</span></b></p>
            <input type="text" id="customerName" class="input-field" placeholder="Name / Table No.">
            <input type="text" id="orderRemarks" class="input-field" placeholder="Remarks (e.g. No Ice, Extra Salt)">
            <input type="text" id="utrNumber" class="input-field" placeholder="UTR / Txn ID">
            <button class="action-btn" onclick="placeCloudOrder()">✅ Confirm Order</button>
        </div>
    </div>

    <div id="live-tracker" style="display:none; text-align:center; padding:50px;">
        <h2>Token: <span id="display-token">#--</span></h2>
        <h3 id="display-status">Order Accepted! Preparing...</h3>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLcGnxBbKRXP2lasOUVYL11QGog86iTBU",
            authDomain: "nsjuice-07.firebaseapp.com",
            databaseURL: "https://nsjuice-07-default-rtdb.firebaseio.com",
            projectId: "nsjuice-07",
            storageBucket: "nsjuice-07.firebasestorage.app",
            messagingSenderId: "741674109700",
            appId: "1:741674109700:web:0ea165b3567f829c805e51"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = [];
        let total = 0;

        function add(name, price) { cart.push({name, price}); total += price; updateCart(); }
        function updateCart() {
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div>${i.name} - ${i.price}</div>`).join('');
            document.getElementById('total-bill').innerText = total;
        }

        function placeCloudOrder() {
            let name = document.getElementById('customerName').value;
            let remarks = document.getElementById('orderRemarks').value;
            let utr = document.getElementById('utrNumber').value;

            if(!name) { alert("Name enter karein!"); return; }

            db.ref('order_counter').transaction((current) => (current || 0) + 1, (error, committed, snapshot) => {
                if (committed) {
                    let tokenNo = snapshot.val();
                    let newOrderRef = db.ref('live_orders').push();
                    newOrderRef.set({ token: tokenNo, customer: name, remarks: remarks, items: cart, totalAmount: total, utr: utr, status: "Accepted" });

                    document.getElementById('menu-screen').style.display = 'none';
                    document.getElementById('live-tracker').style.display = 'block';
                    document.getElementById('display-token').innerText = "#" + tokenNo;
                }
            });
        }
        
        // Menu Render Logic (Apne purane code se yahan add kar lein)
    </script>
</body>
</html>
